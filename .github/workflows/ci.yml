name: CI

"on":
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  common:
    name: Common Rust checks
    runs-on: ubuntu-22.04

    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo env DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            curl \
            git \
            pkg-config \
            libasound2-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libgtk-3-dev \
            libwayland-dev \
            libx11-dev \
            libxkbcommon-dev
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Test platform-independent crates
        run: cargo test --release --locked -p camera-toolbox-core -p camera-toolbox-app -p camera-toolbox-logging
      - name: Report common Clippy diagnostics
        run: cargo clippy --release --locked --all-targets -p camera-toolbox-core -p camera-toolbox-app -p camera-toolbox-logging

  product:
    name: Unified product ${{ matrix.environment }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: linux-x86_64
            runner: ubuntu-22.04
          - environment: macos-aarch64
            runner: macos-14
          - environment: windows-x86_64
            runner: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo env DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            curl \
            git \
            pkg-config \
            libasound2-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libgtk-3-dev \
            libwayland-dev \
            libx11-dev \
            libxkbcommon-dev
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Build unified product
        shell: bash
        env:
          CAMERA_TOOLBOX_CALIBRATION: "0"
        run: ./build.sh release
      - name: Test all adapter implementations together
        if: runner.os == 'Linux'
        run: >-
          cargo test --release --locked
          -p camera-toolbox-adapters
          --no-default-features
          --features platform-all
      - name: Test internal CLI branch with all providers
        if: runner.os == 'Linux'
        run: >-
          cargo test --release --locked
          -p camera-toolbox-cli --lib
          --no-default-features
          --features platform-all
      - name: Test unified binary target
        if: runner.os == 'Linux'
        run: >-
          cargo test --release --locked
          -p camera-toolbox --all-targets
          --no-default-features
          --features platform-all
      - name: Report unified-product Clippy diagnostics
        if: runner.os == 'Linux'
        run: >-
          cargo clippy --release --locked
          -p camera-toolbox --all-targets
          --no-default-features
          --features platform-all

  opencv-calibration:
    name: OpenCV calibration ${{ matrix.environment }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: linux-x86_64
            runner: ubuntu-22.04
          - environment: macos-aarch64
            runner: macos-14
          - environment: windows-x86_64
            runner: windows-latest
    env:
      VCPKGRS_DYNAMIC: "1"

    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Install Linux OpenCV build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo env DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            clang \
            libclang-dev \
            libopencv-dev \
            pkg-config
      - name: Install macOS OpenCV build dependencies
        if: runner.os == 'macOS'
        run: |
          brew install llvm opencv pkg-config
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"
          echo "DYLD_FALLBACK_LIBRARY_PATH=$(brew --prefix opencv)/lib:$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"
      - name: Install Windows LLVM
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install llvm --yes --no-progress
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Install Windows OpenCV with vcpkg
        if: runner.os == 'Windows'
        uses: lukka/run-vcpkg@v11
        env:
          VCPKG_INSTALLED_DIR: ${{ github.workspace }}/vcpkg/installed
          VCPKG_DEFAULT_TRIPLET: x64-windows
        with:
          runVcpkgInstall: true
          vcpkgJsonGlob: '**/vcpkg.json'
      - name: Activate Windows MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Configure Windows OpenCV discovery
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $runVcpkgRoot = (Resolve-Path $env:RUNVCPKG_VCPKG_ROOT).Path
          $installedRoot = (Resolve-Path (Join-Path $runVcpkgRoot "installed\x64-windows")).Path
          "VCPKG_ROOT=$runVcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VCPKGRS_TRIPLET=x64-windows" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "OPENCV_DISABLE_PROBES=environment,pkg_config,cmake,vcpkg_cmake" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          (Join-Path $installedRoot "bin") | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Test OpenCV calibration adapter
        run: >-
          cargo test --release --locked
          -p camera-toolbox-adapters
          --no-default-features
          --features calibration-opencv
          --lib
          -- --nocapture
