name: CI

"on":
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  common:
    name: Common Rust checks
    runs-on: ubuntu-22.04

    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo env DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            curl \
            git \
            pkg-config \
            libasound2-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libgtk-3-dev \
            libwayland-dev \
            libx11-dev \
            libxkbcommon-dev
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Test platform-independent crates
        run: cargo test --release --locked -p camera-toolbox-core -p camera-toolbox-app -p camera-toolbox-logging
      - name: Report common Clippy diagnostics
        run: cargo clippy --release --locked --all-targets -p camera-toolbox-core -p camera-toolbox-app -p camera-toolbox-logging

  product:
    name: Unified product ${{ matrix.environment }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: linux-x86_64
            runner: ubuntu-22.04
          - environment: macos-aarch64
            runner: macos-14
          - environment: windows-x86_64
            runner: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo env DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential \
            clang \
            ca-certificates \
            curl \
            git \
            libclang-dev \
            python3 \
            pkg-config \
            libasound2-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libgtk-3-dev \
            libwayland-dev \
            libx11-dev \
            libxkbcommon-dev
      - name: Install Python
        if: runner.os != 'Linux'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install macOS LLVM
        if: runner.os == 'macOS'
        run: brew install llvm
      - name: Install Windows LLVM
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install llvm --yes --no-progress
      - name: Activate Windows MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Report Windows native toolchain
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          where.exe link.exe
          where.exe cl.exe
      - name: Prepare pinned OpenCV 5 dependency
        shell: bash
        run: |
          python_command=python3
          if [[ "$RUNNER_OS" == "Windows" ]]; then python_command=python; fi
          "$python_command" scripts/opencv5_dependency.py prepare \
            --github-env "$GITHUB_ENV" \
            --github-path "$GITHUB_PATH"
      - name: Prepare pinned FFmpeg dependency
        shell: bash
        run: |
          python_command=python3
          if [[ "$RUNNER_OS" == "Windows" ]]; then python_command=python; fi
          "$python_command" scripts/ffmpeg_dependency.py prepare \
            --github-env "$GITHUB_ENV" \
            --github-path "$GITHUB_PATH"
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Build unified product
        shell: bash
        run: ./build.sh release
      - name: Smoke unified product on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            env -u DYLD_FALLBACK_LIBRARY_PATH -u DYLD_LIBRARY_PATH \
              target/release/camera-toolbox --help >/dev/null
          else
            env -u LD_LIBRARY_PATH target/release/camera-toolbox --help >/dev/null
          fi
      - name: Smoke unified product on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:PATH = "$env:SystemRoot\System32;$env:SystemRoot"
          & target/release/camera-toolbox.exe --help | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "packaged camera-toolbox smoke failed" }
      - name: Test all adapter implementations together
        if: runner.os == 'Linux'
        run: >-
          cargo test --release --locked
          -p camera-toolbox-adapters
          --no-default-features
          --features platform-all,calibration-opencv
      - name: Test internal CLI branch with all providers
        if: runner.os == 'Linux'
        run: >-
          cargo test --release --locked
          -p camera-toolbox-cli --lib
          --no-default-features
          --features platform-all
      - name: Test unified binary target
        if: runner.os == 'Linux'
        run: >-
          cargo test --release --locked
          -p camera-toolbox --all-targets
          --no-default-features
          --features product-all
      - name: Report unified-product Clippy diagnostics
        if: runner.os == 'Linux'
        run: >-
          cargo clippy --release --locked
          -p camera-toolbox --all-targets
          --no-default-features
          --features product-all

  opencv-calibration:
    name: OpenCV 5 calibration ${{ matrix.environment }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: linux-x86_64
            runner: ubuntu-22.04
          - environment: macos-aarch64
            runner: macos-14
          - environment: windows-x86_64
            runner: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Install Linux LLVM dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo env DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            ca-certificates \
            clang \
            libclang-dev \
            python3
      - name: Install Python
        if: runner.os != 'Linux'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install macOS LLVM
        if: runner.os == 'macOS'
        run: brew install llvm
      - name: Install Windows LLVM
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install llvm --yes --no-progress
      - name: Activate Windows MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Prepare pinned OpenCV 5 dependency
        shell: bash
        run: |
          python_command=python3
          if [[ "$RUNNER_OS" == "Windows" ]]; then python_command=python; fi
          "$python_command" scripts/opencv5_dependency.py prepare \
            --github-env "$GITHUB_ENV" \
            --github-path "$GITHUB_PATH"
      - name: Prepare pinned FFmpeg dependency
        shell: bash
        run: |
          python_command=python3
          if [[ "$RUNNER_OS" == "Windows" ]]; then python_command=python; fi
          "$python_command" scripts/ffmpeg_dependency.py prepare \
            --github-env "$GITHUB_ENV" \
            --github-path "$GITHUB_PATH"
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Test OpenCV 5 calibration adapter
        run: >-
          cargo test --release --locked
          -p camera-toolbox-adapters
          --no-default-features
          --features calibration-opencv
          --lib
          -- --nocapture
