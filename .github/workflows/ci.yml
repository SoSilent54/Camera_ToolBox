name: CI

"on":
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  common:
    name: Common Rust checks
    runs-on: ubuntu-22.04

    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo env DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            curl \
            git \
            pkg-config \
            libasound2-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libgtk-3-dev \
            libwayland-dev \
            libx11-dev \
            libxkbcommon-dev
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Test platform-independent crates
        run: cargo test --release --locked -p camera-toolbox-core -p camera-toolbox-app -p camera-toolbox-logging
      - name: Report common Clippy diagnostics
        run: cargo clippy --release --locked --all-targets -p camera-toolbox-core -p camera-toolbox-app -p camera-toolbox-logging

  product:
    name: Unified product ${{ matrix.environment }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: linux-x86_64
            runner: ubuntu-22.04
          - environment: macos-aarch64
            runner: macos-14
          - environment: windows-x86_64
            runner: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo env DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            curl \
            git \
            pkg-config \
            libasound2-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libgtk-3-dev \
            libwayland-dev \
            libx11-dev \
            libxkbcommon-dev
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Build unified product
        shell: bash
        run: ./build.sh release
      - name: Test all adapter implementations together
        if: runner.os == 'Linux'
        run: >-
          cargo test --release --locked
          -p camera-toolbox-adapters
          --no-default-features
          --features platform-all
      - name: Test internal CLI branch with all providers
        if: runner.os == 'Linux'
        run: >-
          cargo test --release --locked
          -p camera-toolbox-cli --lib
          --no-default-features
          --features platform-all
      - name: Test unified binary target
        if: runner.os == 'Linux'
        run: >-
          cargo test --release --locked
          -p camera-toolbox --all-targets
          --no-default-features
          --features platform-all
      - name: Report unified-product Clippy diagnostics
        if: runner.os == 'Linux'
        run: >-
          cargo clippy --release --locked
          -p camera-toolbox --all-targets
          --no-default-features
          --features platform-all
