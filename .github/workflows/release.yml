name: Release

"on":
  push:
    tags:
      - "**"

permissions:
  contents: read

jobs:
  build-native:
    name: Build ${{ matrix.asset_suffix }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            asset_suffix: macos-aarch64
          - runner: windows-latest
            asset_suffix: windows-x86_64

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binaries
        run: cargo build --workspace --release --locked

      - name: Package Unix release
        if: runner.os != 'Windows'
        env:
          ASSET_SUFFIX: ${{ matrix.asset_suffix }}
        run: |
          bundle="camera-toolbox-${ASSET_SUFFIX}"
          archive="${bundle}.tar.gz"
          mkdir -p "dist/${bundle}"
          install -m 755 target/release/camera-toolbox-cli "dist/${bundle}/"
          install -m 755 target/release/camera-toolbox-tui "dist/${bundle}/"
          install -m 755 target/release/camera-toolbox-gui "dist/${bundle}/"
          install -m 644 README.md "dist/${bundle}/"
          tar -C dist -czf "dist/${archive}" "${bundle}"

      - name: Package Windows release
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          ASSET_SUFFIX: ${{ matrix.asset_suffix }}
        run: |
          $bundle = "camera-toolbox-$env:ASSET_SUFFIX"
          $archive = "$bundle.zip"
          New-Item -ItemType Directory -Force -Path "dist/$bundle" | Out-Null
          Copy-Item target/release/camera-toolbox-cli.exe "dist/$bundle/"
          Copy-Item target/release/camera-toolbox-tui.exe "dist/$bundle/"
          Copy-Item target/release/camera-toolbox-gui.exe "dist/$bundle/"
          Copy-Item README.md "dist/$bundle/"
          Compress-Archive -Path "dist/$bundle" -DestinationPath "dist/$archive" -Force

      - name: Upload release archive
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.asset_suffix }}
          path: dist/camera-toolbox-${{ matrix.asset_suffix }}.*
          if-no-files-found: error

  build-linux:
    name: Build ${{ matrix.asset_suffix }}
    runs-on: ${{ matrix.runner }}
    container:
      image: ubuntu:${{ matrix.ubuntu_version }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            ubuntu_version: "20.04"
            asset_suffix: linux-x86_64-ubuntu20
          - runner: ubuntu-22.04
            ubuntu_version: "22.04"
            asset_suffix: linux-x86_64-ubuntu22
          - runner: ubuntu-22.04-arm
            ubuntu_version: "20.04"
            asset_suffix: linux-aarch64-ubuntu20
          - runner: ubuntu-22.04-arm
            ubuntu_version: "22.04"
            asset_suffix: linux-aarch64-ubuntu22

    steps:
      - name: Install Linux build dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            curl \
            git \
            pkg-config \
            libasound2-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libgtk-3-dev \
            libwayland-dev \
            libx11-dev \
            libxkbcommon-dev

      - name: Check out source
        uses: actions/checkout@v7

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binaries
        run: cargo build --workspace --release --locked

      - name: Package Linux release
        env:
          ASSET_SUFFIX: ${{ matrix.asset_suffix }}
        run: |
          bundle="camera-toolbox-${ASSET_SUFFIX}"
          archive="${bundle}.tar.gz"
          mkdir -p "dist/${bundle}"
          install -m 755 target/release/camera-toolbox-cli "dist/${bundle}/"
          install -m 755 target/release/camera-toolbox-tui "dist/${bundle}/"
          install -m 755 target/release/camera-toolbox-gui "dist/${bundle}/"
          install -m 644 README.md "dist/${bundle}/"
          tar -C dist -czf "dist/${archive}" "${bundle}"

      - name: Upload release archive
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.asset_suffix }}
          path: dist/camera-toolbox-${{ matrix.asset_suffix }}.tar.gz
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs:
      - build-native
      - build-linux
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Download release archives
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Verify release archives
        run: |
          test -f dist/camera-toolbox-macos-aarch64.tar.gz
          test -f dist/camera-toolbox-windows-x86_64.zip
          test -f dist/camera-toolbox-linux-x86_64-ubuntu20.tar.gz
          test -f dist/camera-toolbox-linux-x86_64-ubuntu22.tar.gz
          test -f dist/camera-toolbox-linux-aarch64-ubuntu20.tar.gz
          test -f dist/camera-toolbox-linux-aarch64-ubuntu22.tar.gz

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/camera-toolbox-macos-aarch64.tar.gz
            dist/camera-toolbox-windows-x86_64.zip
            dist/camera-toolbox-linux-x86_64-ubuntu20.tar.gz
            dist/camera-toolbox-linux-x86_64-ubuntu22.tar.gz
            dist/camera-toolbox-linux-aarch64-ubuntu20.tar.gz
            dist/camera-toolbox-linux-aarch64-ubuntu22.tar.gz
