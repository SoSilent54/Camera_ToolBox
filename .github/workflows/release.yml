name: Release

"on":
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: read

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build-eeprom-helper-linux-aarch64:
    name: Build static Linux AArch64 EEPROM helper
    runs-on: ubuntu-22.04-arm
    container:
      image: ubuntu:20.04

    steps:
      - name: Install helper build dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            binutils \
            build-essential \
            ca-certificates \
            curl \
            file \
            git \
            pkg-config
      - name: Check out source
        uses: actions/checkout@v4
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build static helper
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUSTFLAGS: -C target-feature=+crt-static
        run: |
          cargo build --release --locked --target aarch64-unknown-linux-gnu \
            --package camera-toolbox-eeprom-helper \
            --bin camera-toolbox-eeprom-helper
          helper=target/aarch64-unknown-linux-gnu/release/camera-toolbox-eeprom-helper
          file "$helper" | grep -Eq 'ELF 64-bit LSB.*ARM aarch64'
          if readelf -l "$helper" | grep -q 'Requesting program interpreter'; then
            echo 'EEPROM helper must be statically linked' >&2
            exit 1
          fi
      - name: Upload Linux AArch64 helper
        uses: actions/upload-artifact@v4
        with:
          name: eeprom-helper-linux-aarch64
          path: target/aarch64-unknown-linux-gnu/release/camera-toolbox-eeprom-helper
          if-no-files-found: error

  build-native:
    name: Build ${{ matrix.environment }}
    needs: build-eeprom-helper-linux-aarch64
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        environment:
          - macos-aarch64
          - windows-x86_64
        include:
          - environment: macos-aarch64
            runner: macos-14
          - environment: windows-x86_64
            runner: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Download Linux AArch64 EEPROM helper
        uses: actions/download-artifact@v4
        with:
          name: eeprom-helper-linux-aarch64
          path: helper-sidecar
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install macOS LLVM
        if: runner.os == 'macOS'
        run: brew install llvm
      - name: Install Windows LLVM
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install llvm --yes --no-progress
      - name: Activate Windows MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Prepare pinned OpenCV 5 dependency
        shell: bash
        run: |
          python_command=python3
          if [[ "$RUNNER_OS" == "Windows" ]]; then python_command=python; fi
          "$python_command" scripts/opencv5_dependency.py prepare \
            --github-env "$GITHUB_ENV" \
            --github-path "$GITHUB_PATH"
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build unified release
        shell: bash
        run: ./build.sh release

      - name: Package Unix release
        if: runner.os != 'Windows'
        shell: bash
        env:
          ENVIRONMENT: ${{ matrix.environment }}
        run: |
          bundle="camera-toolbox-${ENVIRONMENT}"
          mkdir -p "dist/${bundle}"
          install -m 755 "target/release/camera-toolbox" "dist/${bundle}/"
          install -m 755 "helper-sidecar/camera-toolbox-eeprom-helper" \
            "dist/${bundle}/camera-toolbox-eeprom-helper-linux-aarch64"
          install -m 644 README.md "dist/${bundle}/"
          "$PYTHON" scripts/opencv5_dependency.py bundle --destination "dist/${bundle}"
          env -u DYLD_FALLBACK_LIBRARY_PATH -u DYLD_LIBRARY_PATH \
            "dist/${bundle}/camera-toolbox" --help >/dev/null
          tar -C dist -czf "dist/${bundle}.tar.gz" "${bundle}"

      - name: Package Windows release
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          ENVIRONMENT: ${{ matrix.environment }}
        run: |
          $bundle = "camera-toolbox-$env:ENVIRONMENT"
          New-Item -ItemType Directory -Force -Path "dist/$bundle" | Out-Null
          Copy-Item "target/release/camera-toolbox.exe" "dist/$bundle/"
          Copy-Item "helper-sidecar/camera-toolbox-eeprom-helper" "dist/$bundle/camera-toolbox-eeprom-helper-linux-aarch64"
          Copy-Item README.md "dist/$bundle/"
          & $env:PYTHON scripts/opencv5_dependency.py bundle --destination "dist/$bundle"
          $env:PATH = "$env:SystemRoot\System32;$env:SystemRoot"
          & "dist/$bundle/camera-toolbox.exe" --help | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "packaged camera-toolbox smoke failed" }
          Compress-Archive -Path "dist/$bundle" -DestinationPath "dist/$bundle.zip" -Force

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.environment }}
          path: dist/camera-toolbox-${{ matrix.environment }}.*
          if-no-files-found: error

  build-linux:
    name: Build ${{ matrix.environment }}
    needs: build-eeprom-helper-linux-aarch64
    runs-on: ${{ matrix.runner }}
    container:
      image: ubuntu:${{ matrix.ubuntu_version }}

    strategy:
      fail-fast: false
      matrix:
        environment:
          - linux-x86_64-ubuntu20
          - linux-x86_64-ubuntu22
          - linux-aarch64-ubuntu20
          - linux-aarch64-ubuntu22
        include:
          - environment: linux-x86_64-ubuntu20
            runner: ubuntu-22.04
            ubuntu_version: "20.04"
          - environment: linux-x86_64-ubuntu22
            runner: ubuntu-22.04
            ubuntu_version: "22.04"
          - environment: linux-aarch64-ubuntu20
            runner: ubuntu-22.04-arm
            ubuntu_version: "20.04"
          - environment: linux-aarch64-ubuntu22
            runner: ubuntu-22.04-arm
            ubuntu_version: "22.04"

    steps:
      - name: Install Linux build dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential \
            clang \
            ca-certificates \
            curl \
            git \
            libclang-dev \
            python3 \
            pkg-config \
            libasound2-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libgtk-3-dev \
            libwayland-dev \
            libx11-dev \
            libxkbcommon-dev
      - name: Check out source
        uses: actions/checkout@v4
      - name: Prepare pinned OpenCV 5 dependency
        run: >-
          python3 scripts/opencv5_dependency.py prepare
          --github-env "$GITHUB_ENV"
          --github-path "$GITHUB_PATH"
      - name: Download Linux AArch64 EEPROM helper
        uses: actions/download-artifact@v4
        with:
          name: eeprom-helper-linux-aarch64
          path: helper-sidecar
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build unified release
        run: ./build.sh release
      - name: Package Linux release
        env:
          ENVIRONMENT: ${{ matrix.environment }}
        run: |
          bundle="camera-toolbox-${ENVIRONMENT}"
          mkdir -p "dist/${bundle}"
          install -m 755 "target/release/camera-toolbox" "dist/${bundle}/"
          install -m 755 "helper-sidecar/camera-toolbox-eeprom-helper" \
            "dist/${bundle}/camera-toolbox-eeprom-helper-linux-aarch64"
          install -m 644 README.md "dist/${bundle}/"
          "$PYTHON" scripts/opencv5_dependency.py bundle --destination "dist/${bundle}"
          env -u LD_LIBRARY_PATH "dist/${bundle}/camera-toolbox" --help >/dev/null
          tar -C dist -czf "dist/${bundle}.tar.gz" "${bundle}"
      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.environment }}
          path: dist/camera-toolbox-${{ matrix.environment }}.tar.gz
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs:
      - build-native
      - build-linux
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true
      - name: Verify release archives
        run: |
          test -f "dist/camera-toolbox-macos-aarch64.tar.gz"
          test -f "dist/camera-toolbox-windows-x86_64.zip"
          test -f "dist/camera-toolbox-linux-x86_64-ubuntu20.tar.gz"
          test -f "dist/camera-toolbox-linux-x86_64-ubuntu22.tar.gz"
          test -f "dist/camera-toolbox-linux-aarch64-ubuntu20.tar.gz"
          test -f "dist/camera-toolbox-linux-aarch64-ubuntu22.tar.gz"
      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/camera-toolbox-*.tar.gz
            dist/camera-toolbox-*.zip
