name: Release

"on":
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: read

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build-native:
    name: Build ${{ matrix.environment }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        environment:
          - macos-aarch64
          - windows-x86_64
        include:
          - environment: macos-aarch64
            runner: macos-14
          - environment: windows-x86_64
            runner: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build unified release
        shell: bash
        env:
          CAMERA_TOOLBOX_CALIBRATION: "0"
        run: ./build.sh release

      - name: Package Unix release
        if: runner.os != 'Windows'
        shell: bash
        env:
          ENVIRONMENT: ${{ matrix.environment }}
        run: |
          bundle="camera-toolbox-${ENVIRONMENT}"
          mkdir -p "dist/${bundle}"
          install -m 755 "target/release/camera-toolbox" "dist/${bundle}/"
          install -m 644 README.md "dist/${bundle}/"
          tar -C dist -czf "dist/${bundle}.tar.gz" "${bundle}"

      - name: Package Windows release
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          ENVIRONMENT: ${{ matrix.environment }}
        run: |
          $bundle = "camera-toolbox-$env:ENVIRONMENT"
          New-Item -ItemType Directory -Force -Path "dist/$bundle" | Out-Null
          Copy-Item "target/release/camera-toolbox.exe" "dist/$bundle/"
          Copy-Item README.md "dist/$bundle/"
          Compress-Archive -Path "dist/$bundle" -DestinationPath "dist/$bundle.zip" -Force

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.environment }}
          path: dist/camera-toolbox-${{ matrix.environment }}.*
          if-no-files-found: error

  build-linux:
    name: Build ${{ matrix.environment }}
    runs-on: ${{ matrix.runner }}
    container:
      image: ubuntu:${{ matrix.ubuntu_version }}

    strategy:
      fail-fast: false
      matrix:
        environment:
          - linux-x86_64-ubuntu20
          - linux-x86_64-ubuntu22
          - linux-aarch64-ubuntu20
          - linux-aarch64-ubuntu22
        include:
          - environment: linux-x86_64-ubuntu20
            runner: ubuntu-22.04
            ubuntu_version: "20.04"
          - environment: linux-x86_64-ubuntu22
            runner: ubuntu-22.04
            ubuntu_version: "22.04"
          - environment: linux-aarch64-ubuntu20
            runner: ubuntu-22.04-arm
            ubuntu_version: "20.04"
          - environment: linux-aarch64-ubuntu22
            runner: ubuntu-22.04-arm
            ubuntu_version: "22.04"

    steps:
      - name: Install Linux build dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            curl \
            git \
            pkg-config \
            libasound2-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libgtk-3-dev \
            libwayland-dev \
            libx11-dev \
            libxkbcommon-dev
      - name: Check out source
        uses: actions/checkout@v4
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build unified release
        env:
          CAMERA_TOOLBOX_CALIBRATION: "0"
        run: ./build.sh release
      - name: Package Linux release
        env:
          ENVIRONMENT: ${{ matrix.environment }}
        run: |
          bundle="camera-toolbox-${ENVIRONMENT}"
          mkdir -p "dist/${bundle}"
          install -m 755 "target/release/camera-toolbox" "dist/${bundle}/"
          install -m 644 README.md "dist/${bundle}/"
          tar -C dist -czf "dist/${bundle}.tar.gz" "${bundle}"
      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.environment }}
          path: dist/camera-toolbox-${{ matrix.environment }}.tar.gz
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs:
      - build-native
      - build-linux
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true
      - name: Verify release archives
        run: |
          test -f "dist/camera-toolbox-macos-aarch64.tar.gz"
          test -f "dist/camera-toolbox-windows-x86_64.zip"
          test -f "dist/camera-toolbox-linux-x86_64-ubuntu20.tar.gz"
          test -f "dist/camera-toolbox-linux-x86_64-ubuntu22.tar.gz"
          test -f "dist/camera-toolbox-linux-aarch64-ubuntu20.tar.gz"
          test -f "dist/camera-toolbox-linux-aarch64-ubuntu22.tar.gz"
      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/camera-toolbox-*.tar.gz
            dist/camera-toolbox-*.zip
